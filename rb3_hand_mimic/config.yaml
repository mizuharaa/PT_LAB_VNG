# =============================================================================
# rb3_hand_mimic configuration
# =============================================================================
# Real-time robotic hand mimic demo for the Qualcomm RB3 Gen 2.
# Every value here can be overridden; CLI flags (see `python main.py --help`)
# take precedence over this file.
# =============================================================================

# -----------------------------------------------------------------------------
# CAMERA
# -----------------------------------------------------------------------------
# The RB3 tracking camera (the smaller tracking lens) is the PRIMARY input.
# We prefer low latency over image quality. The larger high-res camera is only
# a fallback/debug source.
camera:
  preferred: "tracking"   # "tracking" | "main" | "any" -- hint for auto-select
  index: "auto"           # "auto" or an integer (e.g. 2). "auto" runs discovery.
  width: 640
  height: 480
  fps: 30                 # try 30 @ 640x480, or 60 @ 320x240 (see README tuning)
  backend: "auto"         # "auto" | "v4l2" | "gstreamer" | "any"
  mirror_preview: true    # flip the *preview* horizontally (selfie view)
  rotate_degrees: 0       # 0 | 90 | 180 | 270 -- physical camera mounting
  buffer_size: 1          # keep at 1: latest-frame-only, low latency
  # Optional explicit allow/deny lists for auto-selection by /dev/video index.
  prefer_indices: []      # e.g. [2, 3] to bias auto-select toward these
  avoid_indices: []       # e.g. [0] to skip the main camera during auto-select

# -----------------------------------------------------------------------------
# CAMERA 2 (optional second view for fusion)
# -----------------------------------------------------------------------------
# A second camera mounted beside the first (in series, at a fixed baseline) sees
# fingers the first view occludes. When enabled, each camera runs its own
# detection and the per-finger curls are fused (see `fusion`). Inherits the
# settings above except the keys overridden here. Off by default -> the standard
# pipeline stays single-camera, lightweight, and fast.
camera2:
  enabled: false          # true, or pass --camera2-index N, to turn on fusion
  index: 1                # /dev/video index (or "auto") of the second camera
  # baseline_mm is informational for now (documents the rig spacing); it will
  # matter once fusion uses geometry rather than just per-finger confidence.
  baseline_mm: 60

# -----------------------------------------------------------------------------
# FUSION (how the two cameras' per-finger weights are combined)
# -----------------------------------------------------------------------------
fusion:
  strategy: "confidence_weighted"  # placeholder: per-source detection-score avg
  min_confidence: 0.3              # ignore a camera below this hand score

# -----------------------------------------------------------------------------
# TRACKER (hand landmark detection)
# -----------------------------------------------------------------------------
tracker:
  backend: "mediapipe"        # "mediapipe" (Tasks HandLandmarker; pluggable)
  # Path to the MediaPipe Tasks hand model (.task), relative to the project root.
  # Download once (~7.8 MB):
  #   curl -L --create-dirs -o models/hand_landmarker.task \
  #     https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task
  model_path: "models/hand_landmarker.task"
  max_num_hands: 2
  model_complexity: 0         # legacy/no-op: the .task model fixes the network
  min_detection_confidence: 0.6
  min_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  # Hand selection when multiple hands are visible:
  select: "largest"           # "largest" | "left" | "right"
  # Reject hands whose landmark score is below this before mapping.
  min_hand_score: 0.5

# -----------------------------------------------------------------------------
# TRANSFORM (mirroring + handedness)  --  CRITICAL for correct mimicking
# -----------------------------------------------------------------------------
transform:
  camera_mirror: true         # is the captured image mirrored (selfie)?
  output_mirror: false        # mirror the finger mapping to the robot
  user_hand: "auto"           # "auto" | "left" | "right" (expected user hand)
  robot_hand: "right"         # physical handedness of the Paxini hand
  palm_facing_camera: true    # demo assumption: palm toward the lens
  invert_fingers: false       # if the robot closes when it should open
  finger_order: ["thumb", "index", "middle", "ring", "pinky"]

# -----------------------------------------------------------------------------
# CALIBRATION
# -----------------------------------------------------------------------------
# Per-finger raw-curl ranges captured from open and closed poses.
# Run:  python tools/record_calibration.py --config config.yaml
# If absent/invalid, safe defaults below are used and a warning is logged.
calibration:
  enabled: true
  file: "calibration.yaml"    # written by record_calibration.py (relative to config)
  # Fallback ranges used when no calibration file exists. raw_open should map
  # to curl 0.0, raw_closed to curl 1.0. These are conservative defaults.
  # "closed" is set to a NATURAL (comfortable) close, not a maximal fist, so a
  # relaxed close reaches 1.0 and a half-bend reads ~0.5. Lower "closed" further
  # if your full close still doesn't reach 1.0; raise it if it saturates too
  # early. Per-user `record_calibration.py` is the precise fix.
  defaults:
    thumb:  { open: 0.08, closed: 0.74 }
    index:  { open: 0.08, closed: 0.84 }
    middle: { open: 0.08, closed: 0.84 }
    ring:   { open: 0.08, closed: 0.84 }
    pinky:  { open: 0.08, closed: 0.84 }
  # Minimum separation between open and closed raw values to be considered valid.
  min_separation: 0.15

# -----------------------------------------------------------------------------
# SMOOTHING
# -----------------------------------------------------------------------------
smoothing:
  # One Euro adapts: heavy smoothing when the hand is still (kills jitter), but
  # it opens up and tracks with little lag during fast motion -- the best fit
  # for "responsive to sudden movement AND sensitive to small changes".
  filter: "one_euro"   # "one_euro" | "ema" | "none"
  ema_alpha: 0.6       # only used when filter == "ema"
  deadband: 0.008      # tiny: One Euro handles jitter, so keep small moves
  one_euro:
    min_cutoff: 1.7    # lower = smoother at rest / more lag on slow moves
    beta: 0.55         # higher = follows fast motion more aggressively
    d_cutoff: 1.0

# -----------------------------------------------------------------------------
# SAFETY
# -----------------------------------------------------------------------------
safety:
  output_min: 0.0
  output_max: 1.0
  # When tracking is lost: hold the last pose for `hold_seconds`, then ease
  # back to the rest pose over `return_seconds`.
  hold_seconds: 0.5
  return_seconds: 1.0
  # Watchdog: if no fresh pose for this long, force return-to-rest.
  watchdog_seconds: 1.5
  # Maximum per-command change per finger (rate limit, units = curl 0..1).
  # Prevents servo slamming but also caps how fast the output can chase a quick
  # gesture. At command_rate_hz=30 a value of 0.5 = full 0->1 in ~66 ms. Raise
  # toward 1.0 for maximum responsiveness (less hardware protection).
  max_step_per_command: 0.5

# -----------------------------------------------------------------------------
# PIPELINE (async detection <-> control)
# -----------------------------------------------------------------------------
# Detection (camera -> landmarks -> curls) runs on its own thread and never
# waits on hand control. The control thread consumes the latest pose and drives
# the hand SDK/serial. This keeps tracking responsive even when the hand SDK is
# slow, blocking, or (today) a placeholder because the real SDK is x86-only.
pipeline:
  control_tick_hz: 120       # how often the control thread re-checks safety/watchdog
  metrics_window: 150        # samples kept for latency percentiles (p50/p90/p99)
  benchmark_report_seconds: 1.0  # how often --benchmark prints a progress line

# -----------------------------------------------------------------------------
# HAND (robotic hand controller)  --  Paxini protocol is configurable
# -----------------------------------------------------------------------------
hand:
  # "sdk"    -> drive the robotic hand through the vendor SDK (HandSdk). The real
  #            VNG x Paxini SDK is x86-only today and not yet ported to the RB3
  #            (aarch64), so this currently uses PlaceholderHandSdk: it logs
  #            commands and runs on any architecture. Swap in the real binding
  #            via hand.sdk.library once the ARM64 SDK is available.
  # "serial" -> text protocol over a serial/USB port (pyserial).
  # "mock"   -> logs commands only (also forced by --dry-run).
  controller: "sdk"
  sdk:
    library: "dexh15"        # "dexh15" (Paxini) | "placeholder" | <ARM64 binding>
  # DexH15 (Paxini) bridge: this app runs on the RB3 (ARM64) and ships 11 joint
  # angles [0..1000] to the DexH15 C++ SDK running inside an x86 VM, which calls
  # setJointPositionsAngle(). Placeholder until the bridge process exists.
  dexh15:
    host: "127.0.0.1"        # x86 VM address reachable from the RB3
    port: 50515
  port: "auto"             # (serial) "auto" or explicit, e.g. "/dev/ttyACM0"
  baudrate: 115200
  timeout: 0.02            # write/read timeout seconds (keep small, non-blocking)
  command_rate_hz: 30      # cap outgoing command frequency
  protocol: "csv"          # (serial) "csv" | "labeled_csv" | "json"
  newline: true            # append "\n" to each command
  value_type: "normalized" # "normalized" (0..1) | "servo" (servo_min..servo_max)
  servo_min: 0
  servo_max: 180
  decimals: 3              # rounding for normalized text protocols
  # Pose sent on startup, on Ctrl+C, and after tracking loss.
  rest_pose:
    thumb: 0.0
    index: 0.0
    middle: 0.0
    ring: 0.0
    pinky: 0.0

# -----------------------------------------------------------------------------
# DEBUG
# -----------------------------------------------------------------------------
debug:
  show_window: true        # OpenCV window (ignored in --headless / --no-window)
  draw_landmarks: true
  draw_curl_bars: true
  draw_fps: true
  window_name: "rb3_hand_mimic"
  # In headless mode, log a status line every N seconds.
  headless_status_seconds: 3.0
  save_debug_frames: false # periodically dump frames to debug_frames/
  debug_frame_dir: "debug_frames"

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR
  file: null               # null = stderr only; or a path like "run.log"
  format: "%(asctime)s %(levelname)-7s %(name)s: %(message)s"
